name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      rebuild-cache:
        description: 'Force rebuild all Maven caches (does not run a release)'
        type: boolean
        default: false

concurrency:
  group: release-${{ github.ref }}

permissions:
  actions: write
  contents: write
  # cosign keyless requires a fresh GitHub Actions OIDC token to mint a
  # short-lived Fulcio cert. Without id-token: write, the sign-blob step
  # uses a stale token from job start and Fulcio rejects it as expired
  # for any matrix cell whose jpackage build runs longer than the token's
  # 10-minute TTL.
  id-token: write

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.get-versions.outputs.versions }}
      latest: ${{ steps.get-versions.outputs.latest }}
    steps:
      - uses: actions/checkout@v6
      - id: get-versions
        run: |
          VERSIONS=$(ls -1 okapi-releases | sort -V | jq -R -s -c 'split("\n") | map(select(length > 0))')
          LATEST=$(ls -1 okapi-releases | sort -V | tail -1)
          echo "versions=$VERSIONS" >> $GITHUB_OUTPUT
          echo "latest=$LATEST" >> $GITHUB_OUTPUT

  cache-deps:
    if: github.event_name == 'workflow_dispatch'
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        okapi-version: ${{ fromJson(needs.setup.outputs.versions) }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Sync per-version POM parent version
        run: |
          PARENT_VERSION=$(sed -n '/<artifactId>okapi-bridge-parent<\/artifactId>/{n;s/.*<version>\(.*\)<\/version>.*/\1/p;}' pom.xml)
          for pom in okapi-releases/*/pom.xml; do
            sed -i "/<parent>/,/<\/parent>/s|<version>[^<]*</version>|<version>${PARENT_VERSION}</version>|" "$pom"
          done

      - name: Delete Maven cache for rebuild
        if: inputs.rebuild-cache == true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for id in $(gh cache list --key "maven-okapi-${{ matrix.okapi-version }}-" --json id -q '.[].id'); do
            gh cache delete "$id" || true
          done

      - name: Compute dependency hash (ignoring version bumps)
        id: dep-hash
        run: |
          HASH=$(cat pom.xml okapi-releases/${{ matrix.okapi-version }}/pom.xml \
            | grep -v '<version>' | sha256sum | cut -c1-16)
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"

      - name: Cache Maven repository (Okapi ${{ matrix.okapi-version }})
        uses: actions/cache@v5
        id: maven-cache
        with:
          path: ~/.m2/repository
          key: maven-okapi-${{ matrix.okapi-version }}-${{ steps.dep-hash.outputs.hash }}
          restore-keys: maven-okapi-${{ matrix.okapi-version }}-

      - name: Generate version pom if missing
        run: |
          if [ ! -f "okapi-releases/${{ matrix.okapi-version }}/pom.xml" ]; then
            ./scripts/generate-version-pom.sh ${{ matrix.okapi-version }}
          fi

      - name: Resolve dependencies
        if: steps.maven-cache.outputs.cache-hit != 'true'
        run: mvn -B dependency:go-offline -f okapi-releases/${{ matrix.okapi-version }}/pom.xml

      - name: Verify resolved JARs are valid
        if: steps.maven-cache.outputs.cache-hit != 'true'
        run: |
          CORRUPT=0
          while IFS= read -r -d '' jar; do
            if ! jar tf "$jar" > /dev/null 2>&1; then
              echo "::error::Corrupt JAR after resolution: $jar"
              CORRUPT=$((CORRUPT + 1))
            fi
          done < <(find ~/.m2/repository/net/sf/okapi -name '*.jar' -type f -print0)
          if [ "$CORRUPT" -gt 0 ]; then
            echo "::error::$CORRUPT corrupt JAR(s) after dependency resolution — aborting to prevent caching bad artifacts"
            exit 1
          fi

  build:
    if: github.event_name == 'push'
    needs: [setup]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        okapi-version: ${{ fromJson(needs.setup.outputs.versions) }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Sync per-version POM parent version
        run: |
          PARENT_VERSION=$(sed -n '/<artifactId>okapi-bridge-parent<\/artifactId>/{n;s/.*<version>\(.*\)<\/version>.*/\1/p;}' pom.xml)
          for pom in okapi-releases/*/pom.xml; do
            sed -i "/<parent>/,/<\/parent>/s|<version>[^<]*</version>|<version>${PARENT_VERSION}</version>|" "$pom"
          done

      - name: Compute dependency hash (ignoring version bumps)
        id: dep-hash
        run: |
          HASH=$(cat pom.xml okapi-releases/${{ matrix.okapi-version }}/pom.xml \
            | grep -v '<version>' | sha256sum | cut -c1-16)
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"

      - name: Cache Maven repository (Okapi ${{ matrix.okapi-version }})
        uses: actions/cache@v5
        id: maven-cache
        with:
          path: ~/.m2/repository
          key: maven-okapi-${{ matrix.okapi-version }}-${{ steps.dep-hash.outputs.hash }}
          restore-keys: maven-okapi-${{ matrix.okapi-version }}-

      - name: Generate version pom if missing
        run: |
          if [ ! -f "okapi-releases/${{ matrix.okapi-version }}/pom.xml" ]; then
            ./scripts/generate-version-pom.sh ${{ matrix.okapi-version }}
          fi

      - name: Resolve dependencies (cache miss)
        if: steps.maven-cache.outputs.cache-hit != 'true'
        run: mvn -B dependency:go-offline -f okapi-releases/${{ matrix.okapi-version }}/pom.xml

      - name: Build with Okapi ${{ matrix.okapi-version }}
        run: mvn -B package -f okapi-releases/${{ matrix.okapi-version }}/pom.xml

      - name: Package release archive
        env:
          TAG: ${{ github.ref_name }}
          OKAPI_VERSION: ${{ matrix.okapi-version }}
        run: ./scripts/package-release.sh "${TAG#v}" "$OKAPI_VERSION"

      - name: Extract capabilities JSON for registry
        if: matrix.okapi-version == needs.setup.outputs.latest
        run: jq '.capabilities' dist/plugin/manifest.json > capabilities.json

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: okapi-bridge-${{ matrix.okapi-version }}
          path: |
            okapi-bridge-*.tar.gz
            okapi-bridge-*.tar.gz.sha256
            capabilities.json

      - name: Upload jar-with-dependencies (for v2 packaging)
        uses: actions/upload-artifact@v7
        with:
          name: jar-${{ matrix.okapi-version }}
          path: okapi-releases/${{ matrix.okapi-version }}/target/neokapi-bridge-*-jar-with-dependencies.jar

  package-v2:
    # Mode-C plugin tarballs per (okapi-version, os, arch). Each tarball
    # is built with `jpackage --type app-image`, bundling a native
    # launcher + JRE built from JDK 17. jpackage requires running on
    # the target OS — cross-build is unsupported — so the matrix is
    # one runner per host architecture.
    if: github.event_name == 'push'
    needs: [setup, build]
    strategy:
      fail-fast: false
      matrix:
        okapi-version: ${{ fromJson(needs.setup.outputs.versions) }}
        target:
          - { os: linux,   arch: amd64, runner: ubuntu-latest }
          - { os: linux,   arch: arm64, runner: ubuntu-24.04-arm }
          - { os: darwin,  arch: amd64, runner: macos-13 }
          - { os: darwin,  arch: arm64, runner: macos-latest }
          - { os: windows, arch: amd64, runner: windows-latest }
    runs-on: ${{ matrix.target.runner }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go (manifest-gen)
        uses: actions/setup-go@v6
        with:
          go-version: '1.23'

      - name: Set up JDK 17 (jpackage source + bundled runtime image)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Download JAR for ${{ matrix.okapi-version }}
        uses: actions/download-artifact@v8
        with:
          name: jar-${{ matrix.okapi-version }}
          path: okapi-releases/${{ matrix.okapi-version }}/target/

      - name: Build v2 plugin tarball (jpackage)
        shell: bash
        env:
          OKAPI_VERSION: ${{ matrix.okapi-version }}
          TARGET_OS: ${{ matrix.target.os }}
          TARGET_ARCH: ${{ matrix.target.arch }}
        run: |
          ./scripts/package-release-v2.sh \
            --okapi-version "$OKAPI_VERSION" \
            --os "$TARGET_OS" \
            --arch "$TARGET_ARCH"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Cosign sign-blob (keyless)
        shell: bash
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          for tarball in dist/v2/*.tar.gz; do
            cosign sign-blob --yes \
              --output-signature "${tarball}.sig" \
              --output-certificate "${tarball}.pem" \
              "${tarball}"
          done

      - name: Upload v2 plugin artifacts
        uses: actions/upload-artifact@v7
        with:
          name: v2-${{ matrix.okapi-version }}-${{ matrix.target.os }}-${{ matrix.target.arch }}
          path: |
            dist/v2/*.tar.gz
            dist/v2/*.tar.gz.sha256
            dist/v2/*.sig
            dist/v2/*.pem

  release:
    needs: [build, package-v2]
    # package-v2 may fail for one platform without blocking the release —
    # any v2 tarballs that exist will still be uploaded.
    if: always() && !cancelled() && github.event_name == 'push' && needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/okapi-bridge-*.tar.gz
            artifacts/okapi-bridge-*.tar.gz.sha256
            artifacts/kapi-okapi-bridge_*.tar.gz
            artifacts/kapi-okapi-bridge_*.tar.gz.sha256
            artifacts/kapi-okapi-bridge_*.tar.gz.sig
            artifacts/kapi-okapi-bridge_*.tar.gz.pem
          generate_release_notes: true

  publish-testdata:
    name: Trigger Okapi Test Data
    needs: [setup, release]
    if: always() && !cancelled() && needs.release.result == 'success'
    uses: ./.github/workflows/okapi-testdata.yml
    with:
      okapi_version: ${{ needs.setup.outputs.latest }}
    secrets: inherit

  update-registry:
    needs: [setup, release]
    if: always() && !cancelled() && needs.release.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Checkout registry
        uses: actions/checkout@v6
        with:
          repository: neokapi/registry
          token: ${{ secrets.NEOKAPI_GITHUB_TOKEN }}
          path: registry

      - name: Update plugins.json
        env:
          TAG: ${{ github.ref_name }}
          OKAPI_LATEST: ${{ needs.setup.outputs.latest }}
        run: ./scripts/update-registry.sh "$TAG" registry artifacts "$OKAPI_LATEST"

      - name: Commit and push registry update
        run: |
          cd registry
          git config user.name "neokapi-bot"
          git config user.email "bot@neokapi.dev"
          git add plugins.json
          git commit -m "Update okapi to ${GITHUB_REF_NAME}"
          git push
